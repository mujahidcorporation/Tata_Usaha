<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Tata Usaha</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/content.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>TATA USAHA</h2>

  <button onclick="showMenu('suratMasuk')">Surat Masuk</button>
  <button onclick="showMenu('suratKeluar')">Surat Keluar</button>

</div>

<!-- CONTENT -->
<div class="content">

  <!-- FORM INPUT (tetap satu form) -->
  <h3>Form Surat</h3>

  <input type="text" id="noInput" placeholder="No Surat">
  <input type="text" id="perihalInput" placeholder="Perihal">
  <input type="text" id="fileInput" placeholder="Link File">

  <button onclick="simpanData()">Simpan</button>

  <hr>

  <!-- SURAT MASUK -->
  <div id="suratMasuk" class="menu active">

    <h2>Surat Masuk</h2>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Perihal</th>
          <th>File</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody id="suratMasukTable"></tbody>
    </table>

  </div>

  <!-- SURAT KELUAR -->
  <div id="suratKeluar" class="menu">

    <h2>Surat Keluar</h2>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Perihal</th>
          <th>File</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody id="suratKeluarTable"></tbody>
    </table>

  </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
